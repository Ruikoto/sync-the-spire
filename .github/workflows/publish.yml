name: Publish Windows (Single EXE)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_PATH: "SyncTheSpire/SyncTheSpire.csproj"
  BINARY_NAME: "SyncTheSpire"

jobs:
  build:
    name: Build ${{ matrix.rid }} (${{ matrix.self_contained == true && 'Full' || 'Lite' }})
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
        self_contained: [true, false]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version Name
        id: version
        run: |
          $ver = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "nightly-$(Get-Date -Format 'yyyyMMdd-HHmmss' -AsUTC)" }
          echo "VERSION_TAG=$ver" >> $env:GITHUB_OUTPUT

      - name: Get File Suffix
        id: suffix
        run: |
          $suf = if ("${{ matrix.self_contained }}" -eq "true") { "" } else { "-dependent" }
          echo "FILE_SUFFIX=$suf" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          $r2r = "${{ matrix.self_contained }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained ${{ matrix.self_contained }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:PublishReadyToRun=$r2r `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:AssemblyName=${{ env.BINARY_NAME }} `
            -p:InformationalVersion=${{ steps.version.outputs.VERSION_TAG }} `
            -o ./publish_output

      - name: Prepare Package
        run: |
          New-Item -ItemType Directory -Force -Path ./package
          Copy-Item -Path "./publish_output/${{ env.BINARY_NAME }}.exe" -Destination "./package/${{ env.BINARY_NAME }}.exe"
          # wwwroot is embedded as content — SingleFile + IncludeAllContentForSelfExtract bundles it inside the exe,
          # but we also ship it alongside for users who want to tinker with the frontend
          if (Test-Path "./publish_output/wwwroot") {
            Copy-Item -Recurse -Path "./publish_output/wwwroot" -Destination "./package/wwwroot"
          }
          if (Test-Path "README.md") { Copy-Item -Path "README.md" -Destination "./package/README.md" }

      - name: Create ZIP Archive
        run: |
          $zipName = "${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION_TAG }}-${{ matrix.rid }}${{ steps.suffix.outputs.FILE_SUFFIX }}.zip"
          Compress-Archive -Path "./package/*" -DestinationPath "./$zipName"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}${{ steps.suffix.outputs.FILE_SUFFIX }}
          path: ./*.zip

  build-msix:
    name: Build MSIX ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            # strip leading 'v' and convert to 4-part MSIX version (e.g. v1.2.3 -> 1.2.3.0)
            $semver = $tag -replace '^v', ''
            $parts = $semver.Split('.')
            while ($parts.Length -lt 3) { $parts += '0' }
            $msixVer = "$($parts[0]).$($parts[1]).$($parts[2]).0"
            echo "VERSION_TAG=$tag" >> $env:GITHUB_OUTPUT
            echo "MSIX_VERSION=$msixVer" >> $env:GITHUB_OUTPUT
          } else {
            # nightly: use a date-based version so the msix is installable for local testing
            $ts = Get-Date -AsUTC
            $msixVer = "0.$($ts.ToString('yy')).$($ts.ToString('MMdd')).$($ts.ToString('HHmm'))"
            echo "VERSION_TAG=nightly-$($ts.ToString('yyyyMMdd-HHmmss'))" >> $env:GITHUB_OUTPUT
            echo "MSIX_VERSION=$msixVer" >> $env:GITHUB_OUTPUT
          }

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download MinGit
        run: |
          # MinGit is x64-only; ARM64 Windows runs it via x86-64 emulation
          $url = "https://github.com/git-for-windows/git/releases/download/v2.49.0.windows.1/MinGit-2.49.0-64-bit.zip"
          Invoke-WebRequest -Uri $url -OutFile mingit.zip
          Expand-Archive -Path mingit.zip -DestinationPath ./mingit-extracted -Force

      - name: Publish (non-SingleFile for MSIX)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:AssemblyName=${{ env.BINARY_NAME }} `
            -p:InformationalVersion=${{ steps.version.outputs.VERSION_TAG }} `
            -o ./publish_output

      - name: Stage MSIX Layout
        run: |
          $layout = "./msix_layout"
          New-Item -ItemType Directory -Force -Path $layout

          # app binaries
          Copy-Item -Recurse -Path "./publish_output/*" -Destination "$layout/"

          # bundled MinGit
          New-Item -ItemType Directory -Force -Path "$layout/tools/mingit"
          Copy-Item -Recurse -Path "./mingit-extracted/*" -Destination "$layout/tools/mingit/"

          # inject version and architecture into manifest
          $arch = if ("${{ matrix.rid }}" -eq "win-x64") { "x64" } else { "arm64" }
          $manifest = Get-Content "SyncTheSpire/Package.appxmanifest" -Raw
          $manifest = $manifest -replace 'Version="0\.0\.0\.0"', "Version=`"${{ steps.version.outputs.MSIX_VERSION }}`""
          $manifest = $manifest -replace 'ProcessorArchitecture="x64"', "ProcessorArchitecture=`"$arch`""
          $manifest | Out-File "$layout/AppxManifest.xml" -Encoding utf8

          # store tile assets
          New-Item -ItemType Directory -Force -Path "$layout/assets/store"
          if (Test-Path "SyncTheSpire/assets/store/*.png") {
            Copy-Item -Path "SyncTheSpire/assets/store/*.png" -Destination "$layout/assets/store/"
          }

      - name: Find Windows SDK tools
        id: sdk
        run: |
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          echo "SDK_BIN=$($sdkBin.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create MSIX Package
        run: |
          $msixName = "${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION_TAG }}-${{ matrix.rid }}.msix"
          & "${{ steps.sdk.outputs.SDK_BIN }}\makeappx.exe" pack /d ./msix_layout /p "./$msixName" /o
          echo "MSIX_FILE=$msixName" >> $env:GITHUB_ENV

      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-${{ matrix.rid }}
          path: ./*.msix

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-msix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate Release Notes
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          PROXY_URL="https://sts-dl.rkto.cc/$REPO/releases/download/$TAG"
          NAME="${{ env.BINARY_NAME }}"

          FILE_X64_FULL="$NAME-$TAG-win-x64.zip"
          FILE_X64_LITE="$NAME-$TAG-win-x64-dependent.zip"
          FILE_ARM64_FULL="$NAME-$TAG-win-arm64.zip"
          FILE_ARM64_LITE="$NAME-$TAG-win-arm64-dependent.zip"

          cat <<'NOTES' > release_note.md
          ### 📥 下载指南 / Download Guide

          请选择你需要的版本。如果你不知道要下载哪个，请下载 👉 **[推荐版本 (Recommended)](%%PROXY%%/%%X64_FULL%%)** 👈。

          #### 🇨🇳 中国大陆用户推荐 (Proxy)

          | 架构 (Arch) | 自包含 (Self-Contained) <br> *(无需运行环境，体积稍大)* | 非自包含 (Framework-Dependent) <br> *(需要 .NET 运行时，体积小)* |
          | :--- | :---: | :---: |
          | **Windows x64** <br> *(绝大多数电脑)* | [**下载 / Download**](%%PROXY%%/%%X64_FULL%%) | [下载 / Download](%%PROXY%%/%%X64_LITE%%) |
          | **Windows ARM64** <br> *(Surface Pro X, Mac VM)* | [**下载 / Download**](%%PROXY%%/%%ARM64_FULL%%) | [下载 / Download](%%PROXY%%/%%ARM64_LITE%%) |

          #### GitHub Direct

          | 架构 (Arch) | 自包含 (Self-Contained) | 非自包含 (Framework-Dependent) |
          | :--- | :---: | :---: |
          | **Windows x64** | [下载 / Download](%%BASE%%/%%X64_FULL%%) | [下载 / Download](%%BASE%%/%%X64_LITE%%) |
          | **Windows ARM64** | [下载 / Download](%%BASE%%/%%ARM64_FULL%%) | [下载 / Download](%%BASE%%/%%ARM64_LITE%%) |

          ---
          NOTES
          # quoted heredoc prevents expansion, substitute placeholders with actual values
          sed -i \
            -e "s|%%PROXY%%|$PROXY_URL|g" \
            -e "s|%%BASE%%|$BASE_URL|g" \
            -e "s|%%X64_FULL%%|$FILE_X64_FULL|g" \
            -e "s|%%X64_LITE%%|$FILE_X64_LITE|g" \
            -e "s|%%ARM64_FULL%%|$FILE_ARM64_FULL|g" \
            -e "s|%%ARM64_LITE%%|$FILE_ARM64_LITE|g" \
            release_note.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.msix
          body_path: release_note.md
          generate_release_notes: true

      - name: Deploy version info to gh-pages
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          NAME="${{ env.BINARY_NAME }}"
          PROXY="https://sts-dl.rkto.cc/$REPO/releases/download/$TAG"
          REMOTE="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$REPO.git"

          # read release metadata
          CHANGELOG=$(cat changelog.md 2>/dev/null || echo "")
          FORCE=$(jq -r '.force_update // false' release-info.json)
          FORCE_BELOW=$(jq -r '.force_update_below // ""' release-info.json)
          POPUP_BELOW=$(jq -r '.popup_update_below // ""' release-info.json)

          # clone existing gh-pages to preserve announcements etc.
          git clone --branch gh-pages --single-branch "$REMOTE" pages_output || {
            mkdir -p pages_output
            cd pages_output
            git init
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -b gh-pages
            cd ..
          }

          cd pages_output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # build version.json — use --rawfile so multi-line changelog is preserved as-is
          jq -n \
            --arg ver "$TAG" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg rel_url "https://github.com/$REPO/releases/tag/$TAG" \
            --arg dl_x64 "$PROXY/$NAME-$TAG-win-x64.zip" \
            --arg dl_arm "$PROXY/$NAME-$TAG-win-arm64.zip" \
            --rawfile changelog ../changelog.md \
            --argjson force "$FORCE" \
            --arg force_below "$FORCE_BELOW" \
            --arg popup_below "$POPUP_BELOW" \
            '{
              latest_version: $ver,
              published_at: $date,
              release_url: $rel_url,
              download_url_x64: $dl_x64,
              download_url_arm: $dl_arm,
              force_update: $force,
              changelog: ($changelog | rtrimstr("\n")),
              force_update_below: (if $force_below == "" then null else $force_below end),
              popup_update_below: (if $popup_below == "" then null else $popup_below end)
            }' > version.json

          # also sync announcements from repo
          cp ../announcements.json announcements.json

          # CORS headers
          cat <<EOF > _headers
          /version.json
            Access-Control-Allow-Origin: *
          /announcements.json
            Access-Control-Allow-Origin: *
          EOF

          git add version.json announcements.json _headers
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "chore: update version.json for $TAG"
          git push "$REMOTE" gh-pages
