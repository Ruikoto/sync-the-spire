name: Publish Windows (Single EXE)

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: '构建目标'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - zip
          - msix
      version:
        description: '版本号（留空则用 nightly 时间戳，例如 v1.5.0）'
        required: false
        type: string
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: false
        type: boolean
      store_action:
        description: 'Microsoft Store 提交动作'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - dry-run    # 创建 submission + 上传，但不 commit；用于调试
          - submit     # 真正提交到商店
  push:
    tags:
      - 'v*'

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_PATH: "SyncTheSpire/SyncTheSpire.csproj"
  BINARY_NAME: "SyncTheSpire"

jobs:
  build:
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'zip'
    name: Build ${{ matrix.rid }} (${{ matrix.self_contained == true && 'Full' || 'Lite' }})
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
        self_contained: [true, false]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version Name
        id: version
        run: |
          $ver = if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}"
          } elseif ("${{ inputs.version }}" -ne "") {
            "${{ inputs.version }}"
          } else {
            "nightly-$(Get-Date -Format 'yyyyMMdd-HHmmss' -AsUTC)"
          }
          echo "VERSION_TAG=$ver" >> $env:GITHUB_OUTPUT

      - name: Get File Suffix
        id: suffix
        run: |
          $suf = if ("${{ matrix.self_contained }}" -eq "true") { "" } else { "-dependent" }
          echo "FILE_SUFFIX=$suf" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          $r2r = "${{ matrix.self_contained }}"
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained ${{ matrix.self_contained }} `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:PublishReadyToRun=$r2r `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:AssemblyName=${{ env.BINARY_NAME }} `
            -p:InformationalVersion=${{ steps.version.outputs.VERSION_TAG }} `
            -o ./publish_output

      - name: Prepare Package
        run: |
          New-Item -ItemType Directory -Force -Path ./package
          Copy-Item -Path "./publish_output/${{ env.BINARY_NAME }}.exe" -Destination "./package/${{ env.BINARY_NAME }}.exe"
          # wwwroot is embedded as content — SingleFile + IncludeAllContentForSelfExtract bundles it inside the exe,
          # but we also ship it alongside for users who want to tinker with the frontend
          if (Test-Path "./publish_output/wwwroot") {
            Copy-Item -Recurse -Path "./publish_output/wwwroot" -Destination "./package/wwwroot"
          }
          if (Test-Path "README.md") { Copy-Item -Path "README.md" -Destination "./package/README.md" }

      - name: Create ZIP Archive
        run: |
          $zipName = "${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION_TAG }}-${{ matrix.rid }}${{ steps.suffix.outputs.FILE_SUFFIX }}.zip"
          Compress-Archive -Path "./package/*" -DestinationPath "./$zipName"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.rid }}${{ steps.suffix.outputs.FILE_SUFFIX }}
          path: ./*.zip
          retention-days: 1

  build-msix:
    # also triggered when store_action != 'none', regardless of build_target
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'msix' || inputs.store_action != 'none'
    name: Build MSIX ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            # strip leading 'v' and convert to 4-part MSIX version (e.g. v1.2.3 -> 1.2.3.0)
            $semver = $tag -replace '^v', ''
            $parts = $semver.Split('.')
            while ($parts.Length -lt 3) { $parts += '0' }
            $msixVer = "$($parts[0]).$($parts[1]).$($parts[2]).0"
            echo "VERSION_TAG=$tag" >> $env:GITHUB_OUTPUT
            echo "MSIX_VERSION=$msixVer" >> $env:GITHUB_OUTPUT
          } elseif ("${{ inputs.version }}" -ne "") {
            $tag = "${{ inputs.version }}"
            $semver = $tag -replace '^v', ''
            $parts = $semver.Split('.')
            while ($parts.Length -lt 3) { $parts += '0' }
            $msixVer = "$($parts[0]).$($parts[1]).$($parts[2]).0"
            echo "VERSION_TAG=$tag" >> $env:GITHUB_OUTPUT
            echo "MSIX_VERSION=$msixVer" >> $env:GITHUB_OUTPUT
          } else {
            # nightly: date-based version for local testing — no leading zeros allowed in MSIX
            $ts = Get-Date -AsUTC
            $msixVer = "0.$($ts.Year % 100).$($ts.Month * 100 + $ts.Day).$($ts.Hour * 100 + $ts.Minute)"
            echo "VERSION_TAG=nightly-$($ts.ToString('yyyyMMdd-HHmmss'))" >> $env:GITHUB_OUTPUT
            echo "MSIX_VERSION=$msixVer" >> $env:GITHUB_OUTPUT
          }

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download MinGit
        run: |
          # MinGit is x64-only; ARM64 Windows runs it via x86-64 emulation
          $url = "https://github.com/git-for-windows/git/releases/download/v2.49.0.windows.1/MinGit-2.49.0-64-bit.zip"
          Invoke-WebRequest -Uri $url -OutFile mingit.zip
          Expand-Archive -Path mingit.zip -DestinationPath ./mingit-extracted -Force

      - name: Publish (non-SingleFile for MSIX)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:AssemblyName=${{ env.BINARY_NAME }} `
            -p:InformationalVersion=${{ steps.version.outputs.VERSION_TAG }} `
            -o ./publish_output

      - name: Stage MSIX Layout
        run: |
          $layout = "./msix_layout"
          New-Item -ItemType Directory -Force -Path $layout

          # app binaries
          Copy-Item -Recurse -Path "./publish_output/*" -Destination "$layout/"

          # bundled MinGit
          New-Item -ItemType Directory -Force -Path "$layout/tools/mingit"
          Copy-Item -Recurse -Path "./mingit-extracted/*" -Destination "$layout/tools/mingit/"

          # inject version and architecture into manifest
          $arch = if ("${{ matrix.rid }}" -eq "win-x64") { "x64" } else { "arm64" }
          $manifest = Get-Content "SyncTheSpire/Package.appxmanifest" -Raw
          $manifest = $manifest -replace 'Version="0\.0\.0\.0"', "Version=`"${{ steps.version.outputs.MSIX_VERSION }}`""
          $manifest = $manifest -replace 'ProcessorArchitecture="x64"', "ProcessorArchitecture=`"$arch`""
          $manifest | Out-File "$layout/AppxManifest.xml" -Encoding utf8

          # store tile assets
          New-Item -ItemType Directory -Force -Path "$layout/assets/store"
          if (Test-Path "SyncTheSpire/assets/store/*.png") {
            Copy-Item -Path "SyncTheSpire/assets/store/*.png" -Destination "$layout/assets/store/"
          }

      - name: Create MSIX Package
        run: |
          # find makeappx.exe directly — old SDK versions (e.g. 14393) don't ship it
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $makeappx) {
            $dirs = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\" -Directory).Name -join ', '
            throw "makeappx.exe not found. Available SDK dirs: $dirs"
          }
          $msixName = "${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION_TAG }}-${{ matrix.rid }}.msix"
          & $makeappx.FullName pack /d ./msix_layout /p "./$msixName" /o

      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-${{ matrix.rid }}
          path: ./*.msix
          retention-days: 1

  release:
    # run on tag push, or manual dispatch with create_release=true
    # !failure() && !cancelled() allows skipped deps (e.g. build skipped when build_target=msix)
    if: |
      !failure() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
       (github.event_name == 'workflow_dispatch' && inputs.create_release == true))
    needs: [build, build-msix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Resolve Version Tag
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION_TAG=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Notes
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ steps.version.outputs.VERSION_TAG }}"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          PROXY_URL="https://sts-dl.rkto.cc/$REPO/releases/download/$TAG"
          NAME="${{ env.BINARY_NAME }}"

          FILE_X64_FULL="$NAME-$TAG-win-x64.zip"
          FILE_X64_LITE="$NAME-$TAG-win-x64-dependent.zip"
          FILE_ARM64_FULL="$NAME-$TAG-win-arm64.zip"
          FILE_ARM64_LITE="$NAME-$TAG-win-arm64-dependent.zip"

          cat <<'NOTES' > release_note.md
          ### 🏪 Microsoft Store

          [![从 Microsoft Store 获取](https://get.microsoft.com/images/zh-CN%20dark.svg)](https://get.microsoft.com/installer/download/9pc112t0c074?referrer=appbadge)

          从 Microsoft Store 安装可获得自动更新，推荐使用。

          ### 📥 下载指南 / Download Guide

          请选择你需要的版本。如果你不知道要下载哪个，请下载 👉 **[推荐版本 (Recommended)](%%PROXY%%/%%X64_FULL%%)** 👈。

          #### 🇨🇳 中国大陆用户推荐 (Proxy)

          | 架构 (Arch) | 自包含 (Self-Contained) <br> *(无需运行环境，体积稍大)* | 非自包含 (Framework-Dependent) <br> *(需要 .NET 运行时，体积小)* |
          | :--- | :---: | :---: |
          | **Windows x64** <br> *(绝大多数电脑)* | [**下载 / Download**](%%PROXY%%/%%X64_FULL%%) | [下载 / Download](%%PROXY%%/%%X64_LITE%%) |
          | **Windows ARM64** <br> *(Surface Pro X, Mac VM)* | [**下载 / Download**](%%PROXY%%/%%ARM64_FULL%%) | [下载 / Download](%%PROXY%%/%%ARM64_LITE%%) |

          #### GitHub Direct

          | 架构 (Arch) | 自包含 (Self-Contained) | 非自包含 (Framework-Dependent) |
          | :--- | :---: | :---: |
          | **Windows x64** | [下载 / Download](%%BASE%%/%%X64_FULL%%) | [下载 / Download](%%BASE%%/%%X64_LITE%%) |
          | **Windows ARM64** | [下载 / Download](%%BASE%%/%%ARM64_FULL%%) | [下载 / Download](%%BASE%%/%%ARM64_LITE%%) |

          ---
          NOTES
          # quoted heredoc prevents expansion, substitute placeholders with actual values
          sed -i \
            -e "s|%%PROXY%%|$PROXY_URL|g" \
            -e "s|%%BASE%%|$BASE_URL|g" \
            -e "s|%%X64_FULL%%|$FILE_X64_FULL|g" \
            -e "s|%%X64_LITE%%|$FILE_X64_LITE|g" \
            -e "s|%%ARM64_FULL%%|$FILE_ARM64_FULL|g" \
            -e "s|%%ARM64_LITE%%|$FILE_ARM64_LITE|g" \
            release_note.md
          # changelog appended after the download guide
          if [ -f changelog.md ]; then
            printf '\n' >> release_note.md
            cat changelog.md >> release_note.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION_TAG }}
          files: |
            ./artifacts/**/*.zip
            ./artifacts/**/*.msix
          body_path: release_note.md
          generate_release_notes: true

      - name: Deploy version info to gh-pages
        # only update version.json when it's a real versioned release (tag push or manual with explicit version)
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
        run: |
          TAG="${{ steps.version.outputs.VERSION_TAG }}"
          REPO="${{ github.repository }}"
          NAME="${{ env.BINARY_NAME }}"
          PROXY="https://sts-dl.rkto.cc/$REPO/releases/download/$TAG"
          REMOTE="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$REPO.git"

          # read release metadata
          CHANGELOG=$(cat changelog.md 2>/dev/null || echo "")
          FORCE=$(jq -r '.force_update // false' release-info.json)
          FORCE_BELOW=$(jq -r '.force_update_below // ""' release-info.json)
          POPUP_BELOW=$(jq -r '.popup_update_below // ""' release-info.json)

          # clone existing gh-pages to preserve announcements etc.
          git clone --branch gh-pages --single-branch "$REMOTE" pages_output || {
            mkdir -p pages_output
            cd pages_output
            git init
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -b gh-pages
            cd ..
          }

          cd pages_output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # build version.json — use --rawfile so multi-line changelog is preserved as-is
          jq -n \
            --arg ver "$TAG" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg rel_url "https://github.com/$REPO/releases/tag/$TAG" \
            --arg dl_x64 "$PROXY/$NAME-$TAG-win-x64.zip" \
            --arg dl_arm "$PROXY/$NAME-$TAG-win-arm64.zip" \
            --rawfile changelog ../changelog.md \
            --argjson force "$FORCE" \
            --arg force_below "$FORCE_BELOW" \
            --arg popup_below "$POPUP_BELOW" \
            '{
              latest_version: $ver,
              published_at: $date,
              release_url: $rel_url,
              download_url_x64: $dl_x64,
              download_url_arm: $dl_arm,
              force_update: $force,
              changelog: ($changelog | rtrimstr("\n")),
              force_update_below: (if $force_below == "" then null else $force_below end),
              popup_update_below: (if $popup_below == "" then null else $popup_below end)
            }' > version.json

          # also sync announcements from repo
          cp ../announcements.json announcements.json

          # CORS headers
          cat <<EOF > _headers
          /version.json
            Access-Control-Allow-Origin: *
          /announcements.json
            Access-Control-Allow-Origin: *
          EOF

          git add version.json announcements.json _headers
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "chore: update version.json for $TAG"
          git push "$REMOTE" gh-pages

  store-submit:
    # run on tag push, or manual dispatch with store_action != 'none'
    # !failure() && !cancelled() keeps it alive even if build (zip) job was skipped
    if: |
      !failure() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
       (github.event_name == 'workflow_dispatch' && inputs.store_action != 'none'))
    needs: [build-msix]
    runs-on: windows-latest
    steps:
      - name: Download MSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: msix-*
          path: ./msix
          merge-multiple: true

      # Partner Center V1 DevCenter Submission API (the one that supports MSIX/PWA).
      # The new "Microsoft Store Submission API" at api.store.microsoft.com is MSI/EXE only.
      # msstore CLI clones the previous submission's packages but doesn't mark them PendingDelete,
      # which leaves the old binaries in place — so we drive REST directly.
      - name: Submit to Microsoft Store
        env:
          TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
          APP_ID: "9PC112T0C074"
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.store_action == 'dry-run' }}
        run: |
          $ErrorActionPreference = "Stop"
          $msixDir = "./msix"
          $apiBase = "https://manage.devcenter.microsoft.com/v1.0/my/applications/$env:APP_ID"

          $msixFiles = @(Get-ChildItem -Path $msixDir -Filter *.msix)
          if ($msixFiles.Count -eq 0) {
              throw "No MSIX files found in downloaded artifacts."
          }
          Write-Host "Found $($msixFiles.Count) MSIX file(s):"
          $msixFiles | ForEach-Object { Write-Host "  - $($_.Name)  ($([math]::Round($_.Length / 1MB, 2)) MB)" }
          $expectedNames = $msixFiles.Name

          if ($env:DRY_RUN -eq "True") {
              Write-Host "::warning::DRY-RUN mode — submission will be created and uploaded but NOT committed."
          }

          # ---- 1. acquire Azure AD token ----
          Write-Host "::group::Acquiring access token"
          $tokenResp = Invoke-RestMethod `
              -Uri "https://login.microsoftonline.com/$env:TENANT_ID/oauth2/token" `
              -Method Post `
              -ContentType "application/x-www-form-urlencoded" `
              -Body @{
                  grant_type    = "client_credentials"
                  client_id     = $env:CLIENT_ID
                  client_secret = $env:CLIENT_SECRET
                  resource      = "https://manage.devcenter.microsoft.com"
              }
          $headers = @{ Authorization = "Bearer $($tokenResp.access_token)" }
          Write-Host "Token acquired (expires_in=$($tokenResp.expires_in)s)"
          Write-Host "::endgroup::"

          # ---- 2. clean up any stale pending submission (only one in-flight allowed) ----
          Write-Host "::group::Checking for pending submissions"
          $appInfo = Invoke-RestMethod -Uri $apiBase -Headers $headers
          if ($appInfo.pendingApplicationSubmission) {
              $pendingId = $appInfo.pendingApplicationSubmission.id
              Write-Host "Deleting stale pending submission $pendingId..."
              Invoke-RestMethod -Uri "$apiBase/submissions/$pendingId" -Headers $headers -Method Delete
          } else {
              Write-Host "No pending submission."
          }
          Write-Host "::endgroup::"

          # ---- 3. create new submission (cloned from last published) ----
          Write-Host "::group::Creating new submission"
          $submission = Invoke-RestMethod -Uri "$apiBase/submissions" -Headers $headers -Method Post
          $submissionId = $submission.id
          $uploadUrl = $submission.fileUploadUrl
          Write-Host "Submission $submissionId created."
          Write-Host "Cloned applicationPackages: $($submission.applicationPackages.Count)"
          $submission.applicationPackages | ForEach-Object {
              Write-Host "  cloned: $($_.fileName)  status=$($_.fileStatus)"
          }
          Write-Host "::endgroup::"

          # ---- 4. mutate applicationPackages: old -> PendingDelete, new -> PendingUpload ----
          Write-Host "::group::Updating package list"
          $newPackages = New-Object System.Collections.ArrayList
          if ($submission.applicationPackages) {
              foreach ($pkg in $submission.applicationPackages) {
                  $pkg.fileStatus = "PendingDelete"
                  [void]$newPackages.Add($pkg)
              }
          }
          foreach ($file in $msixFiles) {
              # use pscustomobject so the array stays homogeneous through ConvertTo-Json
              [void]$newPackages.Add([pscustomobject]@{
                  fileName   = $file.Name
                  fileStatus = "PendingUpload"
              })
          }
          $submission.applicationPackages = @($newPackages)
          Write-Host "New applicationPackages list:"
          $submission.applicationPackages | ForEach-Object { Write-Host "  $($_.fileName) -> $($_.fileStatus)" }
          Write-Host "::endgroup::"

          # ---- 5. PUT updated submission ----
          Write-Host "::group::PUT submission metadata"
          $body = $submission | ConvertTo-Json -Depth 20 -Compress
          Invoke-RestMethod `
              -Uri "$apiBase/submissions/$submissionId" `
              -Headers $headers `
              -Method Put `
              -ContentType "application/json; charset=utf-8" `
              -Body $body | Out-Null
          Write-Host "PUT ok ($($body.Length) bytes)."
          Write-Host "::endgroup::"

          # ---- 6. build a FLAT zip (no parent dir) — fileName in applicationPackages must
          #         match the entry name inside the zip exactly, or the server silently
          #         ignores the upload and your "successful" submission has no new bits.
          Write-Host "::group::Building flat zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "packages.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Add-Type -AssemblyName System.IO.Compression
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::Open($zipPath, [System.IO.Compression.ZipArchiveMode]::Create)
          try {
              foreach ($file in $msixFiles) {
                  [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
                      $archive, $file.FullName, $file.Name, [System.IO.Compression.CompressionLevel]::NoCompression
                  ) | Out-Null
                  Write-Host "  added: $($file.Name)"
              }
          } finally {
              $archive.Dispose()
          }
          $zipSize = (Get-Item $zipPath).Length
          Write-Host "Zip built: $zipPath  ($([math]::Round($zipSize / 1MB, 2)) MB)"

          # verify zip entries match expected fileNames
          $verifyArchive = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
              $entryNames = $verifyArchive.Entries.FullName
          } finally {
              $verifyArchive.Dispose()
          }
          Write-Host "Zip entry names: $($entryNames -join ', ')"
          $missing = $expectedNames | Where-Object { $_ -notin $entryNames }
          if ($missing) { throw "Zip is missing entries: $($missing -join ', ')" }
          Write-Host "::endgroup::"

          # ---- 7. SAS PUT to Azure Blob ----
          # Use HttpClient — Invoke-WebRequest's -InFile path can corrupt large blobs and
          # lacks the streaming control we need for a multi-hundred-MB upload.
          Write-Host "::group::Uploading zip to SAS URL"
          Add-Type -AssemblyName System.Net.Http
          $client = [System.Net.Http.HttpClient]::new()
          $client.Timeout = [TimeSpan]::FromMinutes(30)
          try {
              $stream = [System.IO.File]::OpenRead($zipPath)
              $content = [System.Net.Http.StreamContent]::new($stream)
              $content.Headers.ContentType = [System.Net.Http.Headers.MediaTypeHeaderValue]::new("application/zip")
              $content.Headers.ContentLength = $zipSize
              $req = [System.Net.Http.HttpRequestMessage]::new([System.Net.Http.HttpMethod]::Put, $uploadUrl)
              $req.Content = $content
              $req.Headers.Add("x-ms-blob-type", "BlockBlob")
              $sw = [System.Diagnostics.Stopwatch]::StartNew()
              $resp = $client.SendAsync($req).GetAwaiter().GetResult()
              $sw.Stop()
              if (-not $resp.IsSuccessStatusCode) {
                  $errBody = $resp.Content.ReadAsStringAsync().GetAwaiter().GetResult()
                  throw "SAS upload failed: $($resp.StatusCode) $($resp.ReasonPhrase) — $errBody"
              }
              $stream.Dispose()
              Write-Host "Upload OK in $([math]::Round($sw.Elapsed.TotalSeconds, 1))s."
          } finally {
              $client.Dispose()
          }
          Write-Host "::endgroup::"

          # ---- 8. GET-after-PUT verification — the smoking-gun detector for silent
          #         server-side rejection of our package list. If our PendingUpload entries
          #         aren't reflected back, committing would publish an empty update.
          Write-Host "::group::Verifying server-side state before commit"
          $verifySub = Invoke-RestMethod -Uri "$apiBase/submissions/$submissionId" -Headers $headers
          Write-Host "Server-side applicationPackages after PUT:"
          $verifySub.applicationPackages | ForEach-Object {
              Write-Host "  $($_.fileName) -> $($_.fileStatus)"
          }
          $serverPendingUpload = @($verifySub.applicationPackages | Where-Object { $_.fileStatus -eq "PendingUpload" })
          if ($serverPendingUpload.Count -ne $msixFiles.Count) {
              throw "Mismatch: expected $($msixFiles.Count) PendingUpload entries, server reports $($serverPendingUpload.Count). The PUT didn't take. ABORT before commit."
          }
          $serverNames = $serverPendingUpload.fileName | Sort-Object
          $localNames = $expectedNames | Sort-Object
          if ([string]::Join(',', $serverNames) -ne [string]::Join(',', $localNames)) {
              throw "Mismatch: server PendingUpload names ($($serverNames -join ', ')) differ from local MSIX ($($localNames -join ', '))."
          }
          Write-Host "Server state matches local — safe to commit."
          Write-Host "::endgroup::"

          if ($env:DRY_RUN -eq "True") {
              Write-Host "::warning::DRY-RUN: skipping commit. Submission $submissionId left in pending state — delete it manually or re-run without dry-run."
              return
          }

          # ---- 9. commit ----
          Write-Host "::group::Committing submission"
          Invoke-RestMethod -Uri "$apiBase/submissions/$submissionId/commit" -Headers $headers -Method Post | Out-Null
          Write-Host "Commit posted."
          Write-Host "::endgroup::"

          # ---- 10. poll until processing completes ----
          # Terminal states (per docs): CommitFailed, Certification, Release, Published, Canceled.
          # "PreProcessing" / "CommitStarted" are transient.
          Write-Host "::group::Polling submission status"
          $terminalStates = @("CommitFailed", "Certification", "Release", "Published", "Canceled")
          $deadline = (Get-Date).AddMinutes(30)
          do {
              Start-Sleep -Seconds 30
              $status = Invoke-RestMethod -Uri "$apiBase/submissions/$submissionId/status" -Headers $headers
              Write-Host "[$((Get-Date).ToString('HH:mm:ss'))] Status: $($status.status)"
              if ($status.statusDetails) {
                  if ($status.statusDetails.errors) {
                      $status.statusDetails.errors | ForEach-Object { Write-Host "  error: $($_.code) — $($_.details)" }
                  }
                  if ($status.statusDetails.warnings) {
                      $status.statusDetails.warnings | ForEach-Object { Write-Host "  warning: $($_.code) — $($_.details)" }
                  }
              }
              if ((Get-Date) -gt $deadline) { throw "Polling timeout (30 minutes)." }
          } while ($status.status -notin $terminalStates)
          Write-Host "::endgroup::"

          if ($status.status -in @("CommitFailed", "Canceled")) {
              Write-Host "::error::Submission ended in $($status.status)."
              $status | ConvertTo-Json -Depth 10
              exit 1
          }

          # show final package list for verification
          $finalSub = Invoke-RestMethod -Uri "$apiBase/submissions/$submissionId" -Headers $headers
          Write-Host "Final submitted packages:"
          $finalSub.applicationPackages | Where-Object { $_.fileStatus -ne "PendingDelete" } | ForEach-Object {
              Write-Host "  $($_.fileName) ($($_.fileStatus))"
          }
          Write-Host "::notice::Submission $submissionId reached state: $($status.status)"
